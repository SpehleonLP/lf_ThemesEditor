<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kreatures GUI Theme Package Editor</title>
  <style>
    html, body { margin: 0; height: 100%; font: 13px 'IBM Plex Sans', sans-serif; background: #0c0c10; color: #ddd; }
    #app { height: 100%; }
    .shell { display: grid; grid-template-rows: 52px 1fr; height: 100%; }
    .tb { display: flex; align-items: center; gap: 10px; padding: 0 12px; border-bottom: 1px solid #2a2a33; }
    .tb-name { font: 13px 'JetBrains Mono', monospace; font-weight: 600; }
    .tb-dirty { width: 8px; height: 8px; border-radius: 50%; background: #e0a84d; }
    .tb-spacer { flex: 1; }
    .tb-btn, .tb-status { background: #1a1a22; color: #ddd; border: 1px solid #33333d; border-radius: 4px; padding: 4px 10px; cursor: pointer; }
    .tb-status-err { border-color: #5a2a2a; background: rgba(231,100,97,.12); color: #e76461; }
    .shell-body { display: grid; grid-template-columns: 212px 1fr; min-height: 0; position: relative; }
    .nav { border-right: 1px solid #2a2a33; padding: 8px 0; overflow: auto; }
    .nav-row { display: flex; align-items: center; gap: 8px; width: 100%; background: none; border: none; color: #ccc; padding: 7px 12px; cursor: pointer; }
    .nav-active { background: rgba(140,120,220,.14); border-left: 2px solid #8c78dc; }
    .nav-label { flex: 1; text-align: left; }
    .nav-badge { font: 11px 'JetBrains Mono', monospace; opacity: .7; }
    .nav-dot { width: 7px; height: 7px; border-radius: 50%; }
    .nav-error { background: #e76461; } .nav-warning { background: #e0a84d; } .nav-notice { background: #888; }
    .host-stack { position: relative; min-width: 0; overflow: auto; }
    .surface-host { height: 100%; }
    .borders-surface { display: grid; grid-template-columns: 230px 1fr 1fr; grid-template-rows: 1fr auto; height: 100%; }
    .borders-surface > * { overflow: auto; min-width: 0; }
    .bs-slots { grid-column: 1; grid-row: 1; border-right: 1px solid #2a2a33; display: flex; flex-direction: column; min-height: 0; }
    .sl-rows { flex: 1; overflow: auto; min-height: 0; }
    .sl-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px; cursor: pointer; border-bottom: 1px solid #1f1f27; }
    .sl-row:hover { background: rgba(140,120,220,.08); }
    .sl-row.sl-selected { background: #2d4a63; }
    .sl-thumb { flex: 0 0 32px; width: 32px; height: 32px; border: 1px solid #2a2a33; border-radius: 3px;
      background: repeating-conic-gradient(#1a1a22 0% 25%, #14141a 0% 50%) 50% / 8px 8px;
      display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .sl-thumb canvas { image-rendering: pixelated; display: block; }
    .sl-thumb-empty { background: repeating-conic-gradient(#1a1a22 0% 25%, #14141a 0% 50%) 50% / 8px 8px; }
    .sl-name { flex: 1; min-width: 0; font: 12px 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sl-badge { font: 11px 'JetBrains Mono', monospace; color: #cbb8ff; background: rgba(140,120,220,.16);
      border: 1px solid #46a; border-radius: 8px; padding: 0 6px; flex: none; }
    .sl-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .sl-del { flex: none; background: none; border: 1px solid #33333d; border-radius: 3px; color: #888;
      cursor: pointer; font-size: 11px; line-height: 1; padding: 1px 5px; opacity: 0; }
    .sl-row:hover .sl-del { opacity: 1; }
    .sl-del:hover { color: #e0564a; border-color: #5a2a2a; }
    .sl-add { padding: 6px 8px; border-top: 1px solid #2a2a33; }
    .sl-add-select { width: 100%; background: #1a1a22; color: #ddd; border: 1px solid #33333d;
      border-radius: 4px; padding: 4px 6px; cursor: pointer; font: 12px 'JetBrains Mono', monospace; }
    .sl-add-select:disabled { opacity: .5; cursor: default; }
    .bs-cells { grid-column: 2; grid-row: 1; }
    .src-badge { font: 11px 'JetBrains Mono', monospace; color: #cbb8ff; background: rgba(140,120,220,.16);
      border: 1px solid #46a; border-radius: 8px; padding: 1px 8px; flex: none; }
    .src-badge[hidden] { display: none; }
    .src-status { font: 11px 'JetBrains Mono', monospace; }
    .bs-preview { grid-column: 3; grid-row: 1; border-left: 1px solid #2a2a33; }
    /* Preview stage: GL border canvas with a transparent 2D guide overlay stacked exactly atop it.
       The GL canvas is absolutely positioned/sized through the shared view; the overlay covers the
       full stage. touch-action:none lets wheel-zoom + pointer-pan gestures work on the stage. */
    .pv-stage { position: relative; touch-action: none; }
    .pv-stage .pv-gl { position: absolute; left: 0; top: 0; }
    /* Overlay accepts pointer events for edge-dragging; misses don't stopPropagation, so
       wheel-zoom and shift/middle-pan still bubble up to the .pv-stage gesture handlers. */
    .pv-stage .pv-overlay { position: absolute; inset: 0; pointer-events: auto; touch-action: none; }
    .pv-chips .pv-chip { font: 11px 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 10px;
      border: 1px solid #3a3a44; background: #23232b; color: #bbb; cursor: pointer; }
    .pv-chips .pv-chip[aria-pressed="true"] { background: #2d4a63; border-color: #4a7aa0; color: #e6f2ff; }
    .cm-host { flex: 0 0 132px; padding: 0 4px; }
    .cm-grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr);
      gap: 2px; width: 124px; height: 124px; }
    .cm-tile { display: flex; align-items: center; justify-content: center; padding: 0;
      font: 11px 'JetBrains Mono', monospace; line-height: 1; letter-spacing: -1px;
      border: 1px solid #2a2a33; border-radius: 3px; background: #23232b; color: #cfcfcf;
      cursor: pointer; overflow: hidden; }
    .cm-tile:hover { border-color: #4a7aa0; }
    .cm-tile.cm-selected { background: #2d4a63; border-color: #4a7aa0; color: #e6f2ff; }
    .cm-tile.cm-dimmed { opacity: 0.35; }
    .cm-tile.cm-disabled { cursor: default; background: #1a1a20; border-color: #23232b; color: #555; }
    .cm-tile.cm-disabled:hover { border-color: #23232b; }
    .cm-glyphs { pointer-events: none; }
    .bs-bottom-bar { grid-column: 1 / -1; grid-row: 2; display: flex; gap: 16px; padding: 8px; border-top: 1px solid #2a2a33; overflow: auto; }
    .bs-geometry, .bs-fillmask { min-width: 0; }
    .pf-zone { border: 1px solid #2a2a33; border-radius: 4px; padding: 6px 8px; margin: 0; display: grid; gap: 4px; }
    .pf-zone > legend { padding: 0 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; opacity: .7; }
    .pf-zone label { display: block; font-size: 12px; }
    .pf-zone input[type="text"], .pf-zone select { background: #23232b; color: #cfcfcf; border: 1px solid #2a2a33; border-radius: 3px; }
    .pf-zone input[type="text"]:disabled { opacity: .45; }
    .ro-surface, .as-surface { display: grid; grid-template-columns: 1fr 320px; height: 100%; }
    .ro-list, .as-main { overflow: auto; border-right: 1px solid #2a2a33; }
    .ro-inspector { overflow: auto; padding: 10px; }
    .tl-header { padding: 6px 10px; font-weight: 600; border-bottom: 1px solid #23232b; }
    .tl-count { opacity: .6; font: 11px 'JetBrains Mono', monospace; }
    .tl-row { display: flex; align-items: center; gap: 8px; padding: 5px 10px; cursor: pointer; }
    .tl-active { background: rgba(140,120,220,.14); }
    .tl-name { flex: 1; font: 12px 'JetBrains Mono', monospace; }
    .tl-dead { font-size: 10px; border: 1px dashed #555; border-radius: 3px; padding: 0 4px; opacity: .6; }
    .tl-refs { font: 11px 'JetBrains Mono', monospace; color: #8c78dc; }
    .ro-kicker { font-size: 10px; letter-spacing: .08em; opacity: .6; }
    .ro-name { font: 14px 'JetBrains Mono', monospace; margin: 4px 0 10px; }
    .ro-refhead { font-size: 11px; opacity: .7; margin: 8px 0 4px; }
    .ro-refrow, .as-missing-row { display: flex; gap: 8px; align-items: center; padding: 3px 0; font-size: 12px; }
    .ro-go, .issue-go, .as-go { background: none; border: 1px solid #33333d; border-radius: 3px; color: #8c78dc; cursor: pointer; font-size: 11px; }
    .ro-empty { padding: 12px; opacity: .6; }
    .as-tabs { display: flex; gap: 6px; padding: 8px; }
    .as-tab { background: #1a1a22; border: 1px solid #33333d; color: #ccc; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    .as-active { background: rgba(140,120,220,.14); }
    .as-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(158px, 1fr)); gap: 8px; padding: 8px; }
    .as-card { border: 1px solid #2a2a33; border-radius: 6px; padding: 8px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
    .as-error { border-color: #5a2a2a; background: rgba(231,100,97,.08); }
    .as-selected { outline: 1px solid #8c78dc; }
    .as-fmt { font: 10px 'JetBrains Mono', monospace; align-self: flex-start; padding: 0 4px; border-radius: 3px; background: #222; }
    .as-fmt-webp, .as-fmt-mp3 { color: #e76461; }
    .as-fn { font: 12px 'JetBrains Mono', monospace; }
    .as-pill { font-size: 11px; opacity: .8; }
    .as-status { padding: 6px 0; }
    .as-play { background: #1a1a22; border: 1px solid #33333d; color: #cbb8ff; border-radius: 4px; cursor: pointer; align-self: flex-start; margin-top: 2px; }
    .drawer { position: absolute; right: 0; top: 0; height: 100%; width: 380px; background: #14141a; border-left: 1px solid #2a2a33; overflow: auto; z-index: 40; }
    .drawer-head { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #2a2a33; }
    .drawer-head button { background: none; border: none; color: #ccc; cursor: pointer; }
    .drawer-group { padding: 6px 10px; font-weight: 600; text-transform: capitalize; }
    .drawer-error { color: #e76461; } .drawer-warning { color: #e0a84d; } .drawer-notice { color: #999; }
    .issue-card { padding: 8px 10px; border-bottom: 1px solid #1f1f27; }
    .issue-cat { font: 10px 'JetBrains Mono', monospace; opacity: .6; }
    .issue-msg { font-size: 12px; margin: 3px 0; }
    /* Coding Themes surface */
    .ct-surface { display: grid; grid-template-columns: 390px 1fr; height: 100%; }
    .ct-palette { overflow: auto; border-right: 1px solid #2a2a33; padding: 4px 0; }
    .ct-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; }
    .ct-title { font-weight: 600; }
    .ct-seg { display: flex; border: 1px solid #33333d; border-radius: 4px; overflow: hidden; }
    .ct-seg-btn { background: #1a1a22; border: none; color: #ccc; padding: 4px 12px; cursor: pointer; font: 12px 'JetBrains Mono', monospace; }
    .ct-seg-on { background: rgba(140,120,220,.22); color: #fff; }
    .ct-note { margin: 0 12px 8px; font-size: 11px; opacity: .6; line-height: 1.4; }
    .ct-row { display: flex; align-items: center; gap: 8px; padding: 4px 12px; }
    .ct-row-unset { opacity: .85; }
    .ct-swatch { width: 24px; height: 24px; padding: 0; border: 1px solid #33333d; border-radius: 4px; background: none; cursor: pointer; }
    .ct-add { width: 24px; height: 24px; border: 1px dashed #4a4a55; border-radius: 4px; background: repeating-conic-gradient(#1a1a22 0% 25%, #14141a 0% 50%) 50% / 10px 10px; color: #888; cursor: pointer; }
    .ct-name { flex: 1; font: 12px 'JetBrains Mono', monospace; }
    .ct-name-muted { opacity: .55; }
    .ct-hex { font: 11px 'JetBrains Mono', monospace; opacity: .6; }
    .ct-default { font-size: 10px; border: 1px dashed #555; border-radius: 3px; padding: 0 4px; opacity: .6; }
    .ct-alpha { width: 22px; height: 22px; border: 1px solid #33333d; border-radius: 4px; background: #1a1a22; color: #777; cursor: pointer; text-decoration: line-through; }
    .ct-alpha-on { background: rgba(140,120,220,.22); color: #cbb8ff; text-decoration: none; }
    .ct-unset { width: 22px; height: 22px; border: 1px solid #33333d; border-radius: 4px; background: #1a1a22; color: #888; cursor: pointer; }
    .ct-sample { display: grid; grid-template-rows: 42px 1fr; min-width: 0; }
    .ct-samplehead { display: flex; align-items: center; justify-content: space-between; padding: 0 14px; border-bottom: 1px solid #2a2a33; }
    .ct-kick { font-size: 11px; letter-spacing: .06em; opacity: .7; }
    .ct-tag { font: 11px 'JetBrains Mono', monospace; opacity: .5; }
    .ct-pane { overflow: auto; background: var(--ct-Background); }
    .ct-code { margin: 0; padding: 8px 0; font: 13px/1.55 'JetBrains Mono', monospace; }
    .ct-line { display: flex; align-items: baseline; }
    .ct-curline { background: var(--ct-Line); }
    .ct-mark { width: 3px; align-self: stretch; flex: none; }
    .ct-lnum { width: 34px; text-align: right; padding-right: 10px; flex: none; color: var(--ct-LineNumber); opacity: .8; user-select: none; }
    .ct-text { color: var(--ct-Text); white-space: pre; }
    .ct-err { text-decoration: wavy underline var(--ct-Warnings); text-underline-offset: 3px; }
    /* Response Curves surface */
    .bg-surface { display: grid; grid-template-columns: 64px 220px 1fr 1fr; height: 100%; }
    .bg-surface > * { overflow: auto; min-width: 0; }
    .bg-rail { display: flex; flex-direction: column; gap: 4px; padding: 6px 4px; border-right: 1px solid #2a2a33; }
    .bg-tab { display: flex; flex-direction: column; align-items: center; gap: 2px; background: #1a1a22; border: 1px solid #33333d; border-radius: 4px; color: #ccc; padding: 6px 2px; cursor: pointer; font-size: 11px; }
    .bg-tab-active { background: rgba(140,120,220,.22); color: #fff; }
    .bg-tab-count { font: 10px 'JetBrains Mono', monospace; opacity: .6; }
    .bg-list { border-right: 1px solid #2a2a33; }
    .bg-entrylist { display: flex; flex-direction: column; }
    .bg-el-head { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-bottom: 1px solid #23232b; }
    .bg-el-count { opacity: .6; font: 11px 'JetBrains Mono', monospace; flex: 1; }
    .bg-el-add { background: #1a1a22; border: 1px solid #33333d; color: #ccc; border-radius: 4px; cursor: pointer; }
    .bg-el-row { display: flex; align-items: center; gap: 6px; padding: 5px 10px; cursor: pointer; }
    .bg-el-active { background: rgba(140,120,220,.14); }
    .bg-el-name { flex: 1; font: 12px 'JetBrains Mono', monospace; }
    .bg-el-refs { font: 11px 'JetBrains Mono', monospace; color: #8c78dc; }
    .bg-el-dead { font-size: 10px; border: 1px dashed #555; border-radius: 3px; padding: 0 4px; opacity: .6; }
    .bg-el-del { background: none; border: none; color: #888; cursor: pointer; }
    .bg-preview, .bg-editor { padding: 10px; }
    .bg-editor { border-left: 1px solid #2a2a33; }
    .rc-form { display: flex; flex-direction: column; gap: 10px; }
    .rc-slot { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .rc-slot-name { flex: 1; }
    .rc-play { background: #1a1a22; border: 1px solid #33333d; color: #cbb8ff; border-radius: 4px; cursor: pointer; }
    .rc-comment input, .rc-slot select, .rc-slot input[type="number"], .rc-mark-row input { background: #23232b; color: #cfcfcf; border: 1px solid #2a2a33; border-radius: 3px; }
    .opt-missing { color: #f66; }
    .rc-plot-canvas { border: 1px solid #2a2a33; border-radius: 4px; }
    .rc-plot-marks { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .rc-mark-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .rc-mark-active { background: rgba(140,120,220,.12); border-radius: 3px; }
    .rc-mark-del { background: none; border: none; color: #888; cursor: pointer; }
    .rc-pv-canvas { border: 1px solid #2a2a33; border-radius: 4px; background: #0e0e13; }
    .rc-transport { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .rc-transport button { background: #1a1a22; border: 1px solid #33333d; color: #ccc; border-radius: 4px; cursor: pointer; padding: 2px 10px; }
    .bg-grad-bar { border: 1px solid #2a2a33; border-radius: 4px; cursor: pointer; }
    .bg-grad-stop { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 8px; font-size: 12px; }
    .bg-refby { margin-top: 10px; }
    .bg-refby-head { font-size: 11px; opacity: .7; margin-bottom: 4px; }
    .bg-refby-row { font: 11px 'JetBrains Mono', monospace; opacity: .8; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/ui/boot.ts"></script>
</body>
</html>
